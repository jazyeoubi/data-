<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Employee 201</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Employee 201 Record</h2>
        
        <form id="employeeForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">Employee ID</label>
                    <input type="text" id="empId" class="w-full border p-2 rounded" placeholder="E-2026-001" required>
                </div>
                <div>
                    <label class="block text-sm font-medium">Full Name</label>
                    <input type="text" id="fullName" class="w-full border p-2 rounded" required>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">Department</label>
                    <select id="dept" class="w-full border p-2 rounded">
                        <option>Human Resources</option>
                        <option>Operations</option>
                        <option>Marketing</option>
                        <option>Finance</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium">Date of Hire</label>
                    <input type="date" id="hireDate" class="w-full border p-2 rounded">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                Save to 201 Database
            </button>
        </form>
        <p id="status" class="mt-4 text-sm text-center"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
